site_name: Piper TTS Example
site_url: https://mkdocs-piper-tts.retoweber.info/
remote_branch: gh-pages
theme:
  name: mkdocs
  custom_dir: overrides

plugins:
  - search
  - piper-tts:
      model_dir: models
      asset_dir: assets/piper-tts
      audio_dir: audio
      use_cuda: false
      batch_size: 1
      languages:
        en:
          model: en_US-lessac-medium.onnx
          label: Listen
          download_url: https://huggingface.co/rhasspy/piper-voices/resolve/main/en/en_US/lessac/medium/en_US-lessac-medium.onnx
